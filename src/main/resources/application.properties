# Use H2 in-memory database for simplicity
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Show SQL to help beginners see what's happening
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop

# H2 console enabled to inspect the database via browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# disable default security for now (we're handling roles manually)
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN
